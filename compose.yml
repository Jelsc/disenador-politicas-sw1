version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: tuapp-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    env_file:
      - .env

  redis:
    image: redis:alpine
    container_name: tuapp-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  ai-service:
    build: 
      context: ./services/ai-service
      dockerfile: Dockerfile
    container_name: tuapp-ai-service
    ports:
      - "8000:8000"
    restart: unless-stopped
    env_file:
      - .env

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: tuapp-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/tuapp_db
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped
    env_file:
      - .env

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tuapp-frontend
    ports:
      - "4200:80" # Usaremos nginx en el frontend para servir angular en el puerto 80 del container
    depends_on:
      - backend
    restart: unless-stopped
    env_file:
      - .env

volumes:
  mongodb_data:
