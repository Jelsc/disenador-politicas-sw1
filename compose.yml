version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: tuapp-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/templates:/etc/nginx/templates:ro
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    environment:
      - APP_ENV=${APP_ENV}
      - FRONTEND_DOMAIN=${FRONTEND_DOMAIN}
      - API_DOMAIN=${API_DOMAIN}
    depends_on:
      - frontend
      - backend
      - ai-service
    restart: unless-stopped
    command: /bin/sh -c "envsubst '$$APP_ENV $$FRONTEND_DOMAIN $$API_DOMAIN' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf && exec nginx -g 'daemon off;'"

  certbot:
    image: certbot/certbot
    container_name: tuapp-certbot
    volumes:
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    depends_on:
      - nginx

  mongodb:
    image: mongo:latest
    container_name: tuapp-mongodb
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    env_file:
      - .env

  redis:
    image: redis:alpine
    container_name: tuapp-redis
    restart: unless-stopped

  ai-service:
    build: 
      context: ./services/ai-service
      dockerfile: Dockerfile
    container_name: tuapp-ai-service
    restart: unless-stopped
    env_file:
      - .env

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: tuapp-backend
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/tuapp_db
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - FILE_STORAGE_PATH=/app/uploads
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
    volumes:
      - ./data/uploads:/app/uploads
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped
    env_file:
      - .env

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tuapp-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
    environment:
      - API_URL=${API_URL}
      - AI_URL=${AI_URL}
      - WS_URL=${WS_URL}
    # Reemplazamos el env.template.js al vuelo antes de iniciar angular
    command: >
      /bin/sh -c "
      apk add --no-cache gettext && 
      envsubst < /app/src/assets/env.template.js > /app/src/assets/env.js &&
      npx ng serve --host 0.0.0.0 --poll 2000 --disable-host-check"

volumes:
  mongodb_data:
  certbot_data:
  certbot_www: